# ==============================================================================
# MAHEFOOZ1710 — Dolphin Emulator Full Build + Google Drive Auto-Upload
# Hardware : Dell Optiplex 7050 SFF | i3-6100 (Skylake) | 8GB DDR4
# OS Target: Ubuntu 22.04 LTS
# Controller: Cosmic Byte Stelleris (VID 0079 — with Vibration/Rumble)
# Fixes    : CMAKE_C_COMPILER (not _PROVIDER), SDL2 rumble, ff-memless,
#            VA-API Intel HD 530, Ninja build, Google Drive rclone upload
# ==============================================================================

name: MAHEFOOZ1710 Dolphin Skylake + GDrive Upload

on:
  workflow_dispatch:  # Manual trigger only — run when you want

jobs:
  build-dolphin:
    name: Build Dolphin — Dell Optiplex 7050 i3-6100
    runs-on: ubuntu-22.04

    steps:

      # ────────────────────────────────────────────────────────
      # STEP 1: System check
      # ────────────────────────────────────────────────────────
      - name: System Reality Check
        run: |
          echo "=========================================="
          echo "  OS   : $(lsb_release -d | cut -f2)"
          echo "  Cores: $(nproc)"
          echo "  RAM  : $(free -h | awk '/^Mem/{print $2}')"
          echo "=========================================="

      # ────────────────────────────────────────────────────────
      # STEP 2: Checkout Dolphin source (latest master)
      # ────────────────────────────────────────────────────────
      - name: Checkout Dolphin Source
        uses: actions/checkout@v4
        with:
          repository: 'dolphin-emu/dolphin'
          submodules: recursive
          fetch-depth: 1

      # ────────────────────────────────────────────────────────
      # STEP 3: Install GCC 12 + All Dependencies
      #
      # KEY ADDITIONS vs your old script:
      # + libsdl2-dev        → Cosmic Byte Stelleris detection + RUMBLE
      # + libsdl2-2.0-0      → SDL2 runtime
      # + libva-dev          → VA-API hardware decode (Intel HD 530)
      # + i965-va-driver     → Intel 6th Gen VA-API driver
      # + libvulkan-dev      → Vulkan (better than OpenGL on HD 530)
      # + ninja-build        → 2x faster than make
      # - libsfml-dev        → REMOVED (Dolphin doesn't use SFML)
      # ────────────────────────────────────────────────────────
      - name: Install GCC 12 + All Dependencies
        run: |
          sudo apt-get update

          # === COMPILER ===
          sudo apt-get install -y gcc-12 g++-12

          # === BUILD TOOLS ===
          sudo apt-get install -y \
            cmake ninja-build git build-essential pkg-config

          # === FFMPEG (video encoding) ===
          sudo apt-get install -y \
            libavcodec-dev libavformat-dev libavutil-dev \
            libswscale-dev libswresample-dev

          # === CONTROLLER SUPPORT ===
          # libsdl2-dev  → Cosmic Byte Stelleris + VIBRATION via SDL_JoystickRumble
          # libevdev-dev → Raw input events
          # libudev-dev  → Device detection
          # libhidapi-dev → HID protocol (generic gamepad)
          sudo apt-get install -y \
            libsdl2-dev libsdl2-2.0-0 \
            libevdev-dev libudev-dev libhidapi-dev

          # === DISPLAY ===
          sudo apt-get install -y \
            libx11-dev libxext-dev libxrandr-dev \
            libxi-dev libx11-xcb-dev

          # === AUDIO ===
          sudo apt-get install -y \
            libasound2-dev libpulse-dev

          # === GRAPHICS: OpenGL + VULKAN + VA-API (Intel HD 530) ===
          sudo apt-get install -y \
            libgl1-mesa-dev libvulkan-dev \
            libva-dev i965-va-driver

          # === NETWORK ===
          sudo apt-get install -y \
            libcurl4-openssl-dev libmbedtls-dev libminiupnpc-dev

          # === COMPRESSION ===
          sudo apt-get install -y \
            libzstd-dev liblzo2-dev libbz2-dev

          # === BLUETOOTH + MISC ===
          sudo apt-get install -y \
            libbluetooth-dev gettext libpugixml-dev

          # === QT6 GUI ===
          sudo apt-get install -y \
            qt6-base-dev qt6-base-private-dev \
            libqt6svg6-dev qt6-wayland

          # === RCLONE (Google Drive upload) ===
          # Install latest rclone (apt version is outdated)
          curl -fsSL https://rclone.org/install.sh | sudo bash
          echo "rclone version: $(rclone --version | head -1)"

      # ────────────────────────────────────────────────────────
      # STEP 4: Setup rclone → Google Drive
      #
      # REQUIRED SECRET: Set RCLONE_CONFIG_BASE64 in your repo
      # HOW TO CREATE (do this on YOUR PC, not GitHub):
      #   1. Install rclone: sudo apt install rclone
      #   2. rclone config → New remote → Name: gdrive → Type: drive
      #   3. Follow OAuth flow (select your Google account)
      #   4. base64 -w0 ~/.config/rclone/rclone.conf
      #   5. Copy that long string → GitHub Repo → Settings →
      #      Secrets and Variables → Actions → New Secret →
      #      Name: RCLONE_CONFIG_BASE64 → Paste string → Save
      # ────────────────────────────────────────────────────────
      - name: Setup rclone for Google Drive
        env:
          RCLONE_CONFIG_BASE64: ${{ secrets.RCLONE_CONFIG_BASE64 }}
        run: |
          if [ -z "$RCLONE_CONFIG_BASE64" ]; then
            echo "⚠️  WARNING: RCLONE_CONFIG_BASE64 secret not set!"
            echo "   Build will continue but Google Drive upload will be SKIPPED."
            echo "   See STEP 4 comments for setup instructions."
          else
            mkdir -p ~/.config/rclone
            echo "$RCLONE_CONFIG_BASE64" | base64 -d > ~/.config/rclone/rclone.conf
            # Test connection
            rclone lsd gdrive: --max-depth 1 2>/dev/null && \
              echo "✅ Google Drive connection OK!" || \
              echo "⚠️  Google Drive test failed — check your rclone config"
          fi

      # ────────────────────────────────────────────────────────
      # STEP 5: CMake Configure — Skylake + GCC 12 FIXED
      #
      # CRITICAL FIXES vs your old workflow:
      # ❌ -DCMAKE_C_PROVIDER=None    (doesn't exist)
      # ✅ -DCMAKE_C_COMPILER=gcc-12  (correct flag)
      #
      # ❌ export CFLAGS="..." (cmake ignores shell env sometimes)
      # ✅ -DCMAKE_C_FLAGS="..."      (reliable cmake-level flag)
      #
      # NEW FLAGS:
      # -DENABLE_SDL=ON    → SDL2 controller + rumble/vibration
      # -GNinja            → Faster compilation
      # ────────────────────────────────────────────────────────
      - name: Configure CMake (Skylake i3-6100 Optimized)
        run: |
          mkdir build && cd build

          # Skylake optimization flags
          # -march=skylake    → i3-6100 native instructions (AVX2, BMI2, etc.)
          # -O3               → Max speed optimization
          # -fno-plt          → Faster function calls (reduces PLT overhead)
          # -pipe             → Faster compilation (RAM instead of temp files)
          OPT_FLAGS="-O3 -march=skylake -mtune=skylake -pipe -fno-plt"

          cmake .. \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-12 \
            -DCMAKE_CXX_COMPILER=g++-12 \
            -DCMAKE_C_FLAGS="$OPT_FLAGS" \
            -DCMAKE_CXX_FLAGS="$OPT_FLAGS" \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DENABLE_LTO=ON \
            -DUSE_WAYLAND=ON \
            -DUSE_X11=ON \
            -DENABLE_SDL=ON

          echo ""
          echo "✅ CMake configured successfully!"
          echo "   Compiler : GCC 12"
          echo "   Target   : Skylake (i3-6100)"
          echo "   SDL2     : ON (Cosmic Byte Stelleris + vibration)"
          echo "   LTO      : ON (link-time optimization)"
          echo "   Wayland  : ON | X11 : ON"

      # ────────────────────────────────────────────────────────
      # STEP 6: Compile (Ninja — faster than make)
      # ────────────────────────────────────────────────────────
      - name: Compile Dolphin
        run: |
          cd build
          echo "Starting build with $(nproc) cores (Ninja)..."
          ninja -j$(nproc)
          echo ""
          echo "✅ Build complete!"

      # ────────────────────────────────────────────────────────
      # STEP 7: Package binaries
      # ────────────────────────────────────────────────────────
      - name: Package Build
        run: |
          cd build
          DESTDIR=${{ github.workspace }}/dolphin-install ninja install
          cd ${{ github.workspace }}

          # Archive name includes date for easy identification
          BUILD_DATE=$(date +%Y%m%d)
          TAR_NAME="dolphin-ubuntu22.04-skylake-i3-6100-${BUILD_DATE}.tar.gz"

          tar -czvf "$TAR_NAME" -C dolphin-install .

          # Show file size
          echo ""
          echo "📦 Package: $TAR_NAME"
          echo "   Size   : $(du -sh "$TAR_NAME" | cut -f1)"

          # Save filename for next steps
          echo "TAR_NAME=$TAR_NAME" >> $GITHUB_ENV

      # ────────────────────────────────────────────────────────
      # STEP 8: Upload to GitHub Artifacts (always — as backup)
      # ────────────────────────────────────────────────────────
      - name: Upload to GitHub Artifacts (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: Dolphin-MAHEFOOZ1710-Skylake
          path: ${{ env.TAR_NAME }}
          retention-days: 30

      # ────────────────────────────────────────────────────────
      # STEP 9: Upload to YOUR Google Drive folder
      # Folder: https://drive.google.com/drive/folders/1H28ejDbHH8c_sRBq7tL4YxI6oOUmFgBr
      # ────────────────────────────────────────────────────────
      - name: Upload to Google Drive
        env:
          RCLONE_CONFIG_BASE64: ${{ secrets.RCLONE_CONFIG_BASE64 }}
        run: |
          if [ -z "$RCLONE_CONFIG_BASE64" ]; then
            echo "⚠️  Skipping Google Drive upload: RCLONE_CONFIG_BASE64 not set"
            echo "   Download from GitHub Artifacts instead."
          else
            echo "📤 Uploading to Google Drive..."

            # Your Google Drive folder ID (from your link)
            GDRIVE_FOLDER_ID="1H28ejDbHH8c_sRBq7tL4YxI6oOUmFgBr"

            rclone copy "${{ env.TAR_NAME }}" \
              "gdrive:" \
              --drive-root-folder-id "$GDRIVE_FOLDER_ID" \
              --progress \
              --stats 30s \
              --retries 3 \
              --retries-sleep 10s

            echo ""
            echo "✅ Google Drive upload complete!"
            echo "   Folder: https://drive.google.com/drive/folders/$GDRIVE_FOLDER_ID"
          fi

      # ────────────────────────────────────────────────────────
      # STEP 10: Build Summary
      # ────────────────────────────────────────────────────────
      - name: Build Summary
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║         MAHEFOOZ1710 BUILD COMPLETE ✅                  ║"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║  Package  : ${{ env.TAR_NAME }}"
          echo "║  Compiler : GCC 12 (C++20)"
          echo "║  Target   : Skylake i3-6100 (AVX2)"
          echo "║  SDL2     : YES — Cosmic Byte Stelleris + Vibration"
          echo "║  VA-API   : YES — Intel HD 530 hardware decode"
          echo "║  LTO      : YES — Link-time optimization"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║  AFTER INSTALLING on your PC:                           ║"
          echo "║  1. tar -xzf <file.tar.gz> -C /                        ║"
          echo "║  2. sudo ldconfig                                       ║"
          echo "║  3. dolphin-emu                                         ║"
          echo "║                                                         ║"
          echo "║  CONTROLLER (Cosmic Byte Stelleris):                   ║"
          echo "║  • Dolphin → Controllers → Port 1 → SDL/evdev          ║"
          echo "║  • Vibration: Settings → Controller → Rumble ON        ║"
          echo "╚══════════════════════════════════════════════════════════╝"
          
