name: "04 | BUILD WINE-TKG (Gaming + FSR + Esync + Fsync)"

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Wine Version (e.g., staging, latest)'
        required: false
        default: 'staging'

jobs:
  build-wine:
    runs-on: ubuntu-22.04
    timeout-minutes: 90 # Extended time for compilation
    env:
      # Environment variables for Wine-TKG configuration
      _USE_ESYNC: "true"
      _USE_FSYNC: "true"
      _PROTON_FSR: "true"
      _DXVK_DXGI: "true"
      _PROTON_MF_HACKS: "true"
      WINE_TKG_NON_PACMAN_BUILD: "1"

    steps:
      # --------------------------------------------------
      # STEP 1 — Checkout & Setup
      # --------------------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Timezone
        run: |
          sudo timedatectl set-timezone UTC
          echo "Timezone set to UTC"

      # --------------------------------------------------
      # STEP 2 — Register i386 Architecture
      # --------------------------------------------------
      - name: Register i386 Architecture
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          echo "Foreign architectures: $(dpkg --print-foreign-architectures)"

      # --------------------------------------------------
      # STEP 3 — Cache Apt Packages (Speed Optimization)
      # --------------------------------------------------
      - name: Cache Apt Packages
        id: cache-apt
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives
            ~/.ccache
          key: ${{ runner.os }}-apt-${{ hashFiles('**/.github/workflows/build-wine-tkg.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      # --------------------------------------------------
      # STEP 4 — Install 64-bit Build Tools
      # --------------------------------------------------
      - name: Install 64-bit Build Tools
        run: |
          sudo apt-get install -y --no-install-recommends \
            git wget autoconf automake libtool \
            bison flex \
            gcc g++ gcc-multilib g++-multilib \
            mingw-w64 \
            python3 python3-pip python3-setuptools \
            pkg-config make cmake \
            nasm yasm \
            libncurses5-dev:i386 \
            libx11-dev:i386 \
            libxext-dev:i386 \
            libxrandr-dev:i386 \
            libxcursor-dev:i386 \
            libxi-dev:i386 \
            libxinerama-dev:i386 \
            libxtst-dev:i386 \
            libasound2-dev:i386 \
            libpulse-dev:i386 \
            libdbus-1-dev:i386 \
            libfontconfig-dev:i386 \
            libfreetype6-dev:i386 \
            libgnutls28-dev:i386 \
            libgl-dev:i386 \
            libsdl2-dev:i386 \
            libvulkan-dev:i386 \
            libvulkan1:i386 \
            vulkan-tools \
            libxcomposite-dev:i386 \
            libxfixes-dev:i386 \
            libxrender-dev:i386 \
            libxxf86vm-dev:i386 \
            libosmesa6-dev:i386 \
            libxkbcommon-dev:i386 \
            libgphoto2-dev:i386 \
            libcap-dev:i386 \
            libudev-dev:i386 \
            libusb-1.0-0-dev:i386 \
            libv4l-dev:i386 \
            libmpg123-dev:i386 \
            libopenal-dev:i386 \
            libsndfile1-dev:i386 \
            libgstreamer1.0-dev:i386 \
            libgstreamer-plugins-base1.0-dev:i386 \
            libgstreamer-plugins-bad1.0-dev:i386 \
            libgstreamer-plugins-good1.0-dev:i386 \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev \
            libgstreamer-plugins-good1.0-dev

      # --------------------------------------------------
      # STEP 5 — Clone Wine-TKG (With Submodules)
      # --------------------------------------------------
      - name: Clone Wine-TKG
        run: |
          git clone --depth 1 --recurse-submodules \
            https://github.com/Frogging-Family/wine-tkg-git.git
          cd wine-tkg-git
          echo "=== Verifying Structure ==="
          ls -la
          if [ ! -f "nonpacman-build.sh" ]; then
            echo "::error::nonpacman-build.sh not found in root!"
            exit 1
          fi

      # --------------------------------------------------
      # STEP 6 — Configure Customization
      # --------------------------------------------------
      - name: Apply Gaming Patches
        run: |
          cd wine-tkg-git
          
          # Create customization.cfg if it doesn't exist or overwrite
          cat > customization.cfg <<EOF
          _USE_ESYNC="${_USE_ESYNC}"
          _USE_FSYNC="${_USE_FSYNC}"
          _PROTON_FSR="${_PROTON_FSR}"
          _DXVK_DXGI="${_DXVK_DXGI}"
          _PROTON_MF_HACKS="${_PROTON_MF_HACKS}"
          _USE_GLSLANG="true"
          _USE_VKD3D="true"
          _USE_D3D11="true"
          _USE_D3D12="true"
          _USE_LUTRIS="false"
          _USE_PROTONUP="false"
          _USE_STAGING="true"
          _USE_WINE_GECKO="false"
          _USE_WINE_MONO="false"
          _WINEDLLS="ntdll,winemenubuilder.exe"
          EOF

          echo "=== Config Applied ==="
          cat customization.cfg

      # --------------------------------------------------
      # STEP 7 — Compile Wine-TKG
      # --------------------------------------------------
      - name: Compile Wine-TKG
        run: |
          cd wine-tkg-git
          chmod +x ./nonpacman-build.sh
          
          # Set strict error handling
          set -e
          
          echo "Starting build process..."
          # Using yes "" to auto-confirm prompts
          yes "" | ./nonpacman-build.sh
          
          echo "=== Build Completed ==="
          ls -lh

      # --------------------------------------------------
      # STEP 8 — Locate & Package Output
      # --------------------------------------------------
      - name: Package Wine-TKG
        run: |
          cd wine-tkg-git
          
          # Find the build directory (pattern: wine-tkg-*)
          BUILD_DIR=$(ls -dt wine-tkg-* 2>/dev/null | head -1)
          
          if [ -z "$BUILD_DIR" ]; then
            echo "::error::Build directory not found. Check logs above."
            exit 1
          fi

          echo "Found build directory: $BUILD_DIR"
          
          # Create output folder
          mkdir -p /tmp/wine-tkg-final
          cp -r "$BUILD_DIR" /tmp/wine-tkg-final/
          
          # Verify contents
          echo "=== Contents ==="
          ls -lh /tmp/wine-tkg-final/"$BUILD_DIR"/bin/
          
          # Create tarball
          cd /tmp
          tar -czvf wine-tkg-gaming.tar.gz wine-tkg-final/
          du -sh wine-tkg-gaming.tar.gz

      # --------------------------------------------------
      # STEP 9 — Upload Artifact
      # --------------------------------------------------
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wine-tkg-gaming-${{ github.run_number }}
          path: /tmp/wine-tkg-gaming.tar.gz
          retention-days: 7
          compression-level: 6
